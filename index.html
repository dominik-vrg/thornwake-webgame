<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Thornwake</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="wrap">
            <div class="titlebar"><b>Thornwake</b></div>
            <div class="frame">
                <div class="canvas-stack">
                    <canvas id="game" width="800" height="600"></canvas>
                    <div id="pickupToast" class="toast"></div>
                    <div id="dialogueBox" class="dialogue-box hidden">
                        <div class="dialogue-name" id="dialogueName"></div>
                        <div class="dialogue-text" id="dialogueText"></div>
                        <div class="dialogue-continue">▼ E / Click to continue</div>
                    </div>
                </div>
            </div>
            <div class="hud">
                <div class="keys">Move: <b>WASD / Arrows</b> &nbsp;|&nbsp; Talk: <b>E</b> &nbsp;|&nbsp; Inventory: <b>Tab</b> &nbsp;|&nbsp; Journal: <b>J</b> &nbsp;|&nbsp; Debug: <b>I</b></div>
                <div class="debug" id="debugLine">x:0 y:0 tile:(0, 0) fps:0</div>
            </div>
            <div class="footnote">no libraries and engine used</div>
        </div>

        <div id="inventoryOverlay" class="inv-overlay hidden">
            <div class="inv-panel">
                <div class="inv-header">
                    <span class="inv-title">Inventory</span>
                    <span class="inv-close-hint">Tab / Esc to close</span>
                </div>
                <div class="inv-body">
                    <div class="equip-section">
                        <div class="section-title">Equipment</div>
                        <div class="equip-slots" id="equipSlots"></div>
                        <div class="stats-readout" id="statsReadout"></div>
                    </div>
                    <div class="inv-grid-section">
                        <div class="section-title">Bag</div>
                        <div class="inv-grid" id="invGrid"></div>
                    </div>
                </div>
                <div class="inv-footer">
                    <div class="tooltip" id="itemTooltip"></div>
                    <div class="inv-actions" id="invActions"></div>
                </div>
            </div>
        </div>

        <div id="journalOverlay" class="inv-overlay hidden">
            <div class="inv-panel journal-panel">
                <div class="inv-header">
                    <span class="inv-title">Journal</span>
                    <span class="inv-close-hint">J / Esc to close</span>
                </div>
                <div class="journal-tabs" id="journalTabs">
                    <button class="tab-btn active" data-tab="quests">Quests</button>
                    <button class="tab-btn" data-tab="lore">Lore</button>
                </div>
                <div class="journal-content" id="journalContent"></div>
            </div>
        </div>

        <div id="titleScreen" class="title-screen">
            <div class="title-inner">
                <h1 class="title-heading">Thornwake</h1>
                <svg class="title-divider" viewBox="0 0 200 16" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 8 Q 20 2, 35 8 T 70 8 Q 85 14, 100 8 T 130 8 Q 145 2, 165 8 T 200 8" fill="none" stroke="#6f9e5e" stroke-width="1.5"></path>
                </svg>
                <div class="title-narration" id="titleNarration"></div>
                <button id="beginBtn" class="tool-btn begin-btn">Enter the Forest</button>
                <div class="title-hint">Press Enter or click to begin</div>
            </div>
        </div>
        
        <script src="game.js"></script>
        <script src="inventory.js"></script>
        <script src="journal.js"></script>
        <script src="npc.js"></script>
        <script src="pathfinding.js"></script>
        <script src="enemyAI.js"></script>
        <script src="combat.js"></script>
        <script src="titlescreen.js"></script>
    </body>
</html>
